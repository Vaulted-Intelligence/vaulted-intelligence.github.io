<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaulted Intelligence | Secure. Sovereign. Autonomous.</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            border: 1px solid #333;
            padding: 3rem;
            border-radius: 8px;
            background: linear-gradient(145deg, #0f0f0f, #151515);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 {
            color: #00ff41; /* Matrix Green */
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }
        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .status {
            font-size: 0.8rem;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .contact {
            margin-top: 2rem;
            border-top: 1px solid #222;
            padding-top: 1.5rem;
        }
        a {
            color: #00ff41;
            text-decoration: none;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">System Status: Secure [In Stealth Mode]</div>
        <h1>Vaulted Intelligence</h1>
        <p>AI Consultancy & Cybersecurity Solutions</p>
        
        <div class="contact">
            <p>Direct Inquiries: <a href="mailto:hello@vaultedintelligence.co.uk">hello@vaultedintelligence.co.uk</a></p>
        </div>
    </div>
</body>
</html>
